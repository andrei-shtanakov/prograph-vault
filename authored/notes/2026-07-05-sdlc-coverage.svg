<svg viewBox="0 0 1080 620" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif" role="img">
  <title>Соответствие проектов экосистемы стадиям SDLC</title>
  <desc>Девять стадий жизненного цикла разработки; каждая помечена как покрытая, частично покрытая или пробел, с проектом, который её закрывает. Arbiter — сквозной слой выбора агента. Обратная связь замыкается от Monitor/Improve к Plan.</desc>
  <style>
    .ink{fill:#1f2328;}
    .sub{fill:#6a7280;}
    .card{fill:#f6f7f8;stroke:#d6d9dd;stroke-width:1;}
    .ok{fill:#3f9b6d;}
    .warn{fill:#d29236;}
    .gap{fill:#c15a5a;}
    .hd{fill:#fff;font-weight:600;}
    .lbl{font-size:12.5px;font-weight:600;}
    .small{font-size:10.5px;}
    .tiny{font-size:9.5px;}
  </style>

  <text x="20" y="30" class="ink" font-size="18" font-weight="700">SDLC экосистемы: кто какую стадию закрывает</text>

  <g transform="translate(690,16)">
    <rect x="0" y="0" width="12" height="12" rx="2" class="ok"/><text x="17" y="10" class="sub small">покрыто</text>
    <rect x="95" y="0" width="12" height="12" rx="2" class="warn"/><text x="112" y="10" class="sub small">частично</text>
    <rect x="205" y="0" width="12" height="12" rx="2" class="gap"/><text x="222" y="10" class="sub small">пробел</text>
  </g>

  <g transform="translate(0,60)">
    <g transform="translate(12,0)">
      <rect x="0" y="0" width="112" height="58" rx="7" class="card"/>
      <rect x="0" y="0" width="112" height="20" rx="7" class="ok"/><rect x="0" y="12" width="112" height="8" class="ok"/>
      <text x="56" y="14" text-anchor="middle" class="hd" font-size="11">1 · Plan / Spec</text>
      <text x="56" y="38" text-anchor="middle" class="ink lbl">spec-runner</text>
      <text x="56" y="51" text-anchor="middle" class="sub tiny">+ sdd-framework</text>
    </g>
    <g transform="translate(130,0)">
      <rect x="0" y="0" width="112" height="58" rx="7" class="card"/>
      <rect x="0" y="0" width="112" height="20" rx="7" class="gap"/><rect x="0" y="12" width="112" height="8" class="gap"/>
      <text x="56" y="14" text-anchor="middle" class="hd" font-size="11">2 · Design / Arch</text>
      <text x="56" y="40" text-anchor="middle" class="sub lbl">— нет проекта</text>
      <text x="56" y="52" text-anchor="middle" class="sub tiny">ADR вручную (Cowork)</text>
    </g>
    <g transform="translate(248,0)">
      <rect x="0" y="0" width="112" height="58" rx="7" class="card"/>
      <rect x="0" y="0" width="112" height="20" rx="7" class="ok"/><rect x="0" y="12" width="112" height="8" class="ok"/>
      <text x="56" y="14" text-anchor="middle" class="hd" font-size="11">3 · Implement</text>
      <text x="56" y="38" text-anchor="middle" class="ink lbl">Maestro</text>
      <text x="56" y="51" text-anchor="middle" class="sub tiny">DAG · coding-агенты</text>
    </g>
    <g transform="translate(366,0)">
      <rect x="0" y="0" width="112" height="58" rx="7" class="card"/>
      <rect x="0" y="0" width="112" height="20" rx="7" class="warn"/><rect x="0" y="12" width="112" height="8" class="warn"/>
      <text x="56" y="14" text-anchor="middle" class="hd" font-size="11">4 · Build / CI</text>
      <text x="56" y="38" text-anchor="middle" class="ink lbl">deployer</text>
      <text x="56" y="51" text-anchor="middle" class="sub tiny">verify(build) · нет CI</text>
    </g>
    <g transform="translate(484,0)">
      <rect x="0" y="0" width="112" height="58" rx="7" class="card"/>
      <rect x="0" y="0" width="112" height="20" rx="7" class="ok"/><rect x="0" y="12" width="112" height="8" class="ok"/>
      <text x="56" y="14" text-anchor="middle" class="hd" font-size="11">5 · Test / Eval</text>
      <text x="56" y="38" text-anchor="middle" class="ink lbl">atp-platform</text>
      <text x="56" y="51" text-anchor="middle" class="sub tiny">offline eval · бенчи</text>
    </g>
    <g transform="translate(602,0)">
      <rect x="0" y="0" width="112" height="58" rx="7" class="card"/>
      <rect x="0" y="0" width="112" height="20" rx="7" class="warn"/><rect x="0" y="12" width="112" height="8" class="warn"/>
      <text x="56" y="14" text-anchor="middle" class="hd" font-size="11">6 · Release / Deploy</text>
      <text x="56" y="38" text-anchor="middle" class="ink lbl">deployer</text>
      <text x="56" y="51" text-anchor="middle" class="sub tiny">author ≠ execute</text>
    </g>
    <g transform="translate(720,0)">
      <rect x="0" y="0" width="112" height="58" rx="7" class="card"/>
      <rect x="0" y="0" width="112" height="20" rx="7" class="ok"/><rect x="0" y="12" width="112" height="8" class="ok"/>
      <text x="56" y="14" text-anchor="middle" class="hd" font-size="11">7 · Operate / Run</text>
      <text x="56" y="38" text-anchor="middle" class="ink lbl">proctor-a</text>
      <text x="56" y="51" text-anchor="middle" class="sub tiny">триггеры · workflow</text>
    </g>
    <g transform="translate(838,0)">
      <rect x="0" y="0" width="112" height="58" rx="7" class="card"/>
      <rect x="0" y="0" width="112" height="20" rx="7" class="ok"/><rect x="0" y="12" width="112" height="8" class="ok"/>
      <text x="56" y="14" text-anchor="middle" class="hd" font-size="11">8 · Monitor</text>
      <text x="56" y="38" text-anchor="middle" class="ink lbl">dispatcher</text>
      <text x="56" y="51" text-anchor="middle" class="sub tiny">read-only observ.</text>
    </g>
    <g transform="translate(956,0)">
      <rect x="0" y="0" width="112" height="58" rx="7" class="card"/>
      <rect x="0" y="0" width="112" height="20" rx="7" class="gap"/><rect x="0" y="12" width="112" height="8" class="gap"/>
      <text x="56" y="14" text-anchor="middle" class="hd" font-size="11">9 · Improve / MLOps</text>
      <text x="56" y="40" text-anchor="middle" class="sub lbl">— пробел</text>
      <text x="56" y="52" text-anchor="middle" class="sub tiny">online/drift/retrain</text>
    </g>

    <g fill="#6a7280">
      <path d="M125,29 l5,0 M128,26 l4,3 -4,3z"/>
      <path d="M243,29 l5,0 M246,26 l4,3 -4,3z"/>
      <path d="M361,29 l5,0 M364,26 l4,3 -4,3z"/>
      <path d="M479,29 l5,0 M482,26 l4,3 -4,3z"/>
      <path d="M597,29 l5,0 M600,26 l4,3 -4,3z"/>
      <path d="M715,29 l5,0 M718,26 l4,3 -4,3z"/>
      <path d="M833,29 l5,0 M836,26 l4,3 -4,3z"/>
      <path d="M951,29 l5,0 M954,26 l4,3 -4,3z"/>
    </g>
  </g>

  <g transform="translate(0,138)">
    <rect x="248" y="0" width="348" height="30" rx="6" fill="none" stroke="#3b6ea5" stroke-width="1.4" stroke-dasharray="5 3"/>
    <text x="422" y="19" text-anchor="middle" class="ink" font-size="11.5" font-weight="600">arbiter — выбор/маршрутизация агента (сквозной, стадии 3–5)</text>
  </g>

  <g transform="translate(0,182)">
    <path d="M1012,0 C1012,26 1012,30 900,30 L120,30 C18,30 18,26 18,4" fill="none" stroke="#6a7280" stroke-width="1.3" stroke-dasharray="4 3"/>
    <path d="M18,10 l-3,7 6,0z" fill="#6a7280"/>
    <text x="515" y="26" text-anchor="middle" class="sub small">петля обратной связи — сегодня замыкается вручную (пробел 8→9→1)</text>
  </g>

  <g transform="translate(12,238)">
    <rect x="0" y="0" width="1056" height="150" rx="8" fill="#f6f7f8" stroke="#c15a5a" stroke-width="1.2"/>
    <text x="16" y="24" class="ink" font-size="13.5" font-weight="700">Непокрытые позиции SDLC</text>

    <g transform="translate(16,40)">
      <circle cx="4" cy="8" r="3" class="gap"/><text x="16" y="11" class="ink small" font-weight="600">Design / Architecture</text>
      <text x="16" y="26" class="sub tiny">автоген ADR/дизайна нет — делаем руками в Cowork</text>
      <circle cx="4" cy="52" r="3" class="warn"/><text x="16" y="55" class="ink small" font-weight="600">Build / CI-оркестрация</text>
      <text x="16" y="70" class="sub tiny">deployer верифицирует образ, но пайплайна интеграции нет</text>
      <circle cx="4" cy="96" r="3" class="warn"/><text x="16" y="99" class="ink small" font-weight="600">Deploy execution / rollback</text>
      <text x="16" y="114" class="sub tiny">deployer = author-not-execute; выката и отката нет</text>
    </g>

    <g transform="translate(376,40)">
      <circle cx="4" cy="8" r="3" class="gap"/><text x="16" y="11" class="ink small" font-weight="600">Improve / MLOps (online)</text>
      <text x="16" y="26" class="sub tiny">online-эксперименты + drift + retrain; offline есть (ATP)</text>
      <circle cx="4" cy="52" r="3" class="gap"/><text x="16" y="55" class="ink small" font-weight="600">Security review / compliance</text>
      <text x="16" y="70" class="sub tiny">только флаг require_security_review в proctor-a, не проект</text>
      <circle cx="4" cy="96" r="3" class="gap"/><text x="16" y="99" class="ink small" font-weight="600">Incident response / on-call</text>
      <text x="16" y="114" class="sub tiny">алерты dispatcher есть, реакции/runbook-слоя нет</text>
    </g>

    <g transform="translate(736,40)">
      <text x="0" y="11" class="ink small" font-weight="600">Заметки</text>
      <text x="0" y="28" class="sub tiny">• Plan/Spec покрыт спеками, но продуктовый</text>
      <text x="0" y="41" class="sub tiny">  реквайрмент-сбор — вне периметра.</text>
      <text x="0" y="58" class="sub tiny">• Source/VCS — внешний git, не проект.</text>
      <text x="0" y="75" class="sub tiny">• spec-runner-vscode = UI-грань над</text>
      <text x="0" y="88" class="sub tiny">  spec-runner (стадии 1/3), не отдельная стадия.</text>
      <text x="0" y="112" class="sub tiny" font-style="italic">Сильная зона: 3·Implement → 5·Test → 7·Run → 8·Monitor.</text>
    </g>
  </g>
</svg>
